server.port=8080

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8097
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**

spring.cloud.gateway.routes[1].id=movie-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/movies/**

spring.cloud.gateway.routes[2].id=screen-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/screens/**

spring.cloud.gateway.routes[3].id=show-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/shows/**

spring.cloud.gateway.routes[4].id=seat-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/seats/**

spring.cloud.gateway.routes[5].id=booking-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/bookings/**

spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=http://localhost:8096
spring.cloud.gateway.routes[6].predicates[0]=Path=/payments/**

# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.['/**'].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.['/**'].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.['/**'].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.['/**'].allowCredentials=true

